# Lowest-precedence defaults for local development.
# Override order: defaults -> named profile -> environment.

[runtime]
profile = "local"
log_level = "INFO"

[paths]
runtime_state = ".local/prisma"
corpus_path = "datasets/sample_corpus"
index_path = ".local/prisma/index/qdrant"
manifest_path = ".local/prisma/index/manifest.json"

[retrieval]
chunk_size_chars = 900
chunk_overlap_chars = 150

[embeddings]
backend = "hashing"
dimensions = 384
model_id = "hashing-v1-384"

[vector_index]
backend = "qdrant-local"
collection_name = "prisma_sample_corpus"
distance = "cosine"

[api]
host = "127.0.0.1"
port = 8000

[rag]
default_top_k = 4
max_top_k = 8
min_score = 0.0
min_question_chars = 3
max_question_chars = 500
max_context_chars = 4000
max_context_chars_hard_limit = 8000
max_answer_sentences = 3

[generation]
backend = "local-grounded"
model_id = "local-grounded-v1"
prompt_path = "prompts/baseline_rag.txt"

[workflow]
enabled = true
max_retrieval_attempts = 2
min_context_score = 0.0
enable_query_rewrite = true
require_context_token_overlap = true

[evals]
golden_path = "evals/golden/cases.jsonl"
scorecard_path = ".local/prisma/evals/scorecard.json"
baseline_path = "evals/baselines/phase4-baseline.json"
minimum_pass_rate = 0.8

[prompt_regression]
baseline_path = "evals/baselines/phase4-baseline.json"
baseline_prompt_snapshot_path = "evals/baselines/phase4-prompt-snapshot.json"
report_path = ".local/prisma/evals/regression.json"
